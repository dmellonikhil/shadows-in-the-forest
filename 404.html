<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shadows in the Forest</title>
<script>
  // GitHub Pages 404 redirect trick.
  // Redirects back to index.html preserving the path in a query param.
  const path = window.location.pathname;
  const base = '/shadows-in-the-forest'; // change to your repo name if different
  window.location.replace(
    window.location.origin + base + '/index.html'
  );
</script>
</head>
<body>
<p style="font-family:sans-serif;color:#6a9070;text-align:center;margin-top:40px;">Redirecting…</p>
</body>
</html>
