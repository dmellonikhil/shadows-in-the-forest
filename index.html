<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Shadows in the Forest</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HOME -->
<div id="home-screen" class="screen active">
  <h1>Shadows in the Forest</h1>
  <p>Hide in the shadows.<br>Unite before the light finds you.</p>
  <div id="msg-banner" style="font-size:13px;color:#d08080;text-align:center;min-height:16px;"></div>
  <div class="card" style="display:flex;flex-direction:column;gap:10px;">
    <div><label>Your name</label><input id="player-name" type="text" placeholder="Enter your name" maxlength="16"></div>
    <button class="primary" onclick="goCreate()">Create game</button>
    <button onclick="goJoin()">Join with invite code</button>
  </div>
</div>

<!-- CREATE -->
<div id="create-screen" class="screen">
  <h2>Game settings</h2>
  <div class="card" style="display:flex;flex-direction:column;gap:12px;">
    <div>
      <label>Map size</label>
      <div class="cfg-row">
        <span style="font-size:12px;color:#5a8060;">Cols</span>
        <input type="range" id="cfg-cols" min="8" max="14" value="11" step="1"
          oninput="document.getElementById('cfg-cols-val').textContent=this.value">
        <span class="cfg-val" id="cfg-cols-val">11</span>
      </div>
      <div class="cfg-row">
        <span style="font-size:12px;color:#5a8060;">Rows</span>
        <input type="range" id="cfg-rows" min="8" max="16" value="11" step="1"
          oninput="document.getElementById('cfg-rows-val').textContent=this.value">
        <span class="cfg-val" id="cfg-rows-val">11</span>
      </div>
    </div>
    <div>
      <label>Max shadowlings (2–5)</label>
      <div class="cfg-row">
        <input type="range" id="cfg-maxp" min="2" max="5" value="3" step="1"
          oninput="document.getElementById('cfg-mp-val').textContent=this.value">
        <span class="cfg-val" id="cfg-mp-val">3</span>
      </div>
    </div>
    <div>
      <label>Tree density</label>
      <div class="cfg-row">
        <span style="font-size:11px;color:#4a7060;">sparse</span>
        <input type="range" id="cfg-trees" min="1" max="5" value="3" step="1"
          oninput="document.getElementById('cfg-tree-val').textContent=
            ['','sparse','light','normal','dense','thick'][this.value]">
        <span class="cfg-val" id="cfg-tree-val" style="min-width:48px;">normal</span>
      </div>
    </div>
    <div class="err" id="create-err"></div>
    <div class="btn-row">
      <button onclick="showScreen('home-screen')">← Back</button>
      <button class="primary" onclick="createGame()">Create &amp; get code</button>
    </div>
  </div>
</div>

<!-- JOIN -->
<div id="join-screen" class="screen">
  <h2>Join a game</h2>
  <div class="card" style="display:flex;flex-direction:column;gap:10px;">
    <div>
      <label>Invite code</label>
      <input id="join-code" type="text" placeholder="XXXXXX" maxlength="6"
        style="font-size:20px;letter-spacing:.2em;text-align:center;"
        oninput="this.value=this.value.toUpperCase()">
    </div>
    <div class="err" id="join-err"></div>
    <div class="btn-row">
      <button onclick="showScreen('home-screen')">← Back</button>
      <button class="primary" onclick="joinGame()">Join</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onDisconnect }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getDB, saveSession } from './js/firebase.js';
import { generateMap, computeShadow, randomShadowTiles } from './js/mapgen.js';

const S_COLORS = ['#7a50d0','#3a9090','#c05828','#c03070','#2858b0'];
const db = getDB();

// show any message passed back from game page
const msg = sessionStorage.getItem('sitf_msg');
if (msg) {
  document.getElementById('msg-banner').textContent = msg;
  sessionStorage.removeItem('sitf_msg');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
window.showScreen = showScreen;

const vv = id => document.getElementById(id)?.value.trim() ?? '';
const setErr = (id, m) => { const e = document.getElementById(id); if (e) e.textContent = m; };
const genCode = () => 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'
  .split('').sort(() => Math.random() - .5).slice(0,6).join('');

window.goCreate = () => {
  if (!vv('player-name')) { alert('Enter your name first.'); return; }
  showScreen('create-screen');
};
window.goJoin = () => {
  if (!vv('player-name')) { alert('Enter your name first.'); return; }
  showScreen('join-screen');
};

window.createGame = async () => {
  setErr('create-err', '');
  const cols = +document.getElementById('cfg-cols').value;
  const rows = +document.getElementById('cfg-rows').value;
  const maxP = +document.getElementById('cfg-maxp').value;
  const density = +document.getElementById('cfg-trees').value;
  const name = vv('player-name');
  const map  = generateMap(cols, rows, density);
  const code = genCode();
  const myId = 'p_' + Date.now();

  const gs = {
    code, status: 'lobby', maxShadows: maxP,
    mapData: { map, cols, rows },
    players: { [myId]: { name, role: 'warden', color: '#ffe082' } },
    wardenPos:         { x: 1, y: 1, angle: 0 },
    shadowPositions:   {},
    shadowFrozen:      {},
    shadowTimerFrozen: {},
    shadowDone:        {},
    phase: 'lobby', round: 1,
    lastActionAt: Date.now(),
    movesLeft: 0, winner: null,
  };

  await set(ref(db, 'games/' + code), gs);
  onDisconnect(ref(db, 'games/' + code + '/players/' + myId)).remove();
  saveSession(code, myId, 'warden', name, '#ffe082');
  window.location.href = 'lobby.html';
};

window.joinGame = async () => {
  setErr('join-err', '');
  const code = vv('join-code').toUpperCase();
  const name = vv('player-name');
  if (code.length !== 6) { setErr('join-err', 'Enter a 6-character code.'); return; }

  const snap = await get(ref(db, 'games/' + code));
  if (!snap.exists()) { setErr('join-err', 'Game not found.'); return; }
  const st = snap.val();
  if (st.phase !== 'lobby' || st.status !== 'lobby') {
    setErr('join-err', st.status === 'ended' ? 'Game has ended.' : 'Game already started.');
    return;
  }
  const shadows = Object.keys(st.players || {}).filter(id => st.players[id].role !== 'warden');
  if (shadows.length >= st.maxShadows) { setErr('join-err', 'Game is full.'); return; }

  const myId  = 'p_' + Date.now();
  const idx   = shadows.length;
  const color = S_COLORS[idx];
  const role  = 'shadow_' + idx;

  await update(ref(db, 'games/' + code + '/players/' + myId), { name, role, color });
  onDisconnect(ref(db, 'games/' + code + '/players/' + myId)).remove();
  saveSession(code, myId, role, name, color);
  window.location.href = 'lobby.html';
};
</script>
</body>
</html>
